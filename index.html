<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Green Computing IDC Dashboard</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --danger-color: #e74c3c;
            --background-color: #f5f6fa;
            --card-color: #ffffff;
            --text-color: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-color);
            padding: 30px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%; max-width: 560px; text-align: center;
        }
        h1 { font-size: 24px; margin-bottom: 5px; color: #1abc9c; }
        .subtitle { font-size: 14px; color: #7f8c8d; margin-bottom: 25px; }
        
        .btn {
            width: 100%; padding: 15px; font-size: 16px; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            transition: background 0.2s; margin-bottom: 15px;
        }
        .btn-connect { background-color: #3498db; color: white; }
        .btn-connect.connected { background-color: var(--primary-color); }
        
        /* 유저 액션 버튼 스타일 */
        .btn-stress { background-color: var(--danger-color); color: white; }
        .btn-stress:hover { background-color: #c0392b; }
        
        .panel {
            background: #f8f9fa; border: 1px solid #e9ecef;
            padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: left;
        }
        .panel h3 { margin-top: 0; font-size: 16px; color: #34495e; border-bottom: 2px solid #1abc9c; padding-bottom: 5px;}
        
        .video-container {
            position: relative; width: 100%; padding-bottom: 56.25%; height: 0;
            border-radius: 8px; overflow: hidden; margin-bottom: 15px;
        }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        .display-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 16px; font-weight: bold; }
        .val-box { font-size: 18px; color: #2c3e50; }
        
        /* 그린 컴퓨팅 토글 스위치 디자인 */
        .switch-container {
            display: flex; justify-content: space-between; align-items: center;
            background: #e8f8f5; padding: 15px; border-radius: 8px; margin-top: 15px;
            border: 2px solid #2ecc71;
        }
        .switch {
            position: relative; display: inline-block; width: 60px; height: 34px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(26px); }

        .status-box {
            font-size: 13px; color: #95a5a6; border-top: 1px solid #eee;
            padding-top: 15px; margin-top: 20px; text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>미니 그린 컴퓨팅 시스템 (Green IDC)</h1>
    <div class="subtitle">지능형 워크로드 제어 및 전력 최적화 시스템 모형</div>

    <button id="connectBtn" class="btn btn-connect">1. 아두이노 블루투스 인프라 연결</button>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <!-- 액션 및 상태 모니터링 패널 -->
    <div class="panel">
        <h3>📊 IDC 실시간 자원 모니터링</h3>
        <div class="display-row">
            <span>사용자 유입 트래픽 (Traffic)</span>
            <span id="trafficDisplay" class="val-box">0%</span>
        </div>
        <div class="display-row">
            <span>서버 인프라 전송 부하 (Load)</span>
            <span id="loadDisplay" class="val-box" style="color: #3498db;">0%</span>
        </div>

        <!-- 대규모 부하 발생 버튼 -->
        <button id="stressBtn" class="btn btn-stress" style="margin-top: 10px; margin-bottom: 5px;">시나리오: 서버 대규모 부하(DDoS) 발생</button>

        <!-- 그린 컴퓨팅 활성화 스위치 -->
        <div class="switch-container">
            <span style="color: #27ae60; font-weight: bold; font-size: 15px;">🟢 그린 컴퓨팅 (지능형 전력 최적화)</span>
            <label class="switch">
                <input type="checkbox" id="greenSwitch">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="status-box" id="statusText">
        상태: 아두이노 하드웨어 보드 연결이 필요합니다.
    </div>
</div>

<script>
    let bluetoothDevice = null;
    let rxCharacteristic = null;
    let player = null;
    let mainLoop = null;

    let currentTraffic = 0;
    let isStressTest = false;

    const UUID_SERVICE = "0000ffe0-0000-1000-8000-00805f9b34fb";
    
    const connectBtn = document.getElementById('connectBtn');
    const stressBtn = document.getElementById('stressBtn');
    const greenSwitch = document.getElementById('greenSwitch');
    const trafficDisplay = document.getElementById('trafficDisplay');
    const loadDisplay = document.getElementById('loadDisplay');
    const statusText = document.getElementById('statusText');

    // 1. YouTube API 로드
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ',
            playerVars: { 'playsinline': 1, 'rel': 0 },
            events: { 'onStateChange': onPlayerStateChange }
        });
    }

    // 2. 영상 재생 상태 감지 및 메인 제어 루프 가동
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            if(!isStressTest) currentTraffic = 25; // 기본 평시 스트리밍 트래픽
            if(!mainLoop) mainLoop = setInterval(updateSystem, 500);
        } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
            if(!isStressTest) {
                currentTraffic = 0;
                updateSystem();
            }
        }
    }

    // 3. 부하 발생 버튼 이벤트 (클릭 시 100% 폭증)
    stressBtn.addEventListener('click', () => {
        isStressTest = true;
        currentTraffic = 100;
        statusText.innerText = "경고: 대규모 서비스 요청 폭주! 네트워크 트래픽 100% 도달";
        updateSystem();
        
        // 7초 후 자동으로 트래픽이 평시로 복귀되도록 설정
        setTimeout(() => {
            isStressTest = false;
            if(player && player.getPlayerState() === YT.PlayerState.PLAYING) currentTraffic = 25;
            else currentTraffic = 0;
            statusText.innerText = "상태: 대규모 부하 상황 종료. 평시 트래픽으로 복귀합니다.";
            updateSystem();
        }, 7000);
    });

    // 4. 핵심 시스템 연산: 그린 컴퓨팅 제어 적용 유무에 따른 하드웨어 송신값 결정
    function updateSystem() {
        let sendLoad = currentTraffic;

        // 그린 컴퓨팅 스위치가 켜져 있다면? 지능형 워크로드 분산으로 서버 부하를 절반 이하로 압축!
        if (greenSwitch.checked && currentTraffic > 0) {
            if (currentTraffic === 100) {
                sendLoad = 40; // 100% 폭증 상황을 40% 전력 부하로 스케줄링 최적화
            } else {
                sendLoad = 12; // 25% 평시 상황을 12% 초절전 부하로 최적화
            }
        }

        // UI 디스플레이 업데이트
        trafficDisplay.innerText = currentTraffic + "%";
        loadDisplay.innerText = sendLoad + "%";

        // UI 글자 색상 제어
        trafficDisplay.style.color = currentTraffic > 70 ? 'var(--danger-color)' : '#2c3e50';
        loadDisplay.style.color = greenSwitch.checked ? 'var(--primary-color)' : (sendLoad > 70 ? 'var(--danger-color)' : '#3498db');

        // 아두이노로 실시간 제어 신호(최종 Load 수치) 전송
        sendBluetoothData(sendLoad);
    }

    // 스위치 조작 시 즉시 시스템 반영
    greenSwitch.addEventListener('change', updateSystem);

    // 5. 블루투스 데이터 송신 함수
    async function sendBluetoothData(value) {
        if (rxCharacteristic) {
            try {
                const encoder = new TextEncoder();
                const data = encoder.encode(value + "\n");
                await rxCharacteristic.writeValueWithoutResponse(data);
            } catch (error) {
                console.error("아두이노 통신 실패:", error);
            }
        }
    }

    // 6. 웹 블루투스 연결 구조
    connectBtn.addEventListener('click', async () => {
        if (bluetoothDevice && bluetoothDevice.gatt.connected) return;
        try {
            statusText.innerText = "상태: 아두이노 그린 그리드 탐색 중...";
            bluetoothDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'HC' }, { namePrefix: 'linvor' }, { namePrefix: 'BT' }, { namePrefix: 'AT' }],
                optionalServices: [UUID_SERVICE]
            });
            statusText.innerText = "상태: 서버 연결 및 전력 게이트웨이 동기화 중...";
            const server = await bluetoothDevice.gatt.connect();
            const service = await server.getPrimaryService(UUID_SERVICE);
            const characteristics = await service.getCharacteristics();
            for (let c of characteristics) {
                if (c.properties.write || c.properties.writeWithoutResponse) {
                    rxCharacteristic = c;
                    break;
                }
            }
            statusText.innerText = "상태: 동기화 완료! 유튜브 재생 및 부하 버튼을 테스트해 보세요.";
            connectBtn.innerText = "✔ 그린 컴퓨팅 인프라 동기화 완료";
            connectBtn.classList.add('connected');
        } catch (error) {
            statusText.innerText = "오류: 하드웨어 동기화 실패 (" + error.message + ")";
        }
    });
</script>

</body>
</html>
